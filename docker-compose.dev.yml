name: palouse-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: palouse
      POSTGRES_PASSWORD: palouse
      POSTGRES_DB: palouse
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U palouse -d palouse']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
