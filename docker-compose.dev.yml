name: reqops-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reqops
      POSTGRES_PASSWORD: reqops
      POSTGRES_DB: reqops
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U reqops -d reqops']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
