name: palouse

# LOCAL DEVELOPMENT ONLY. The credentials below are intentionally weak and the
# published ports bind to 127.0.0.1 so the stack is not reachable from the LAN.
# Never reuse these credentials or this file for a deployed environment.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: palouse
      POSTGRES_PASSWORD: palouse
      POSTGRES_DB: palouse
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U palouse -d palouse']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    # Pinned instead of :latest so local dev is reproducible. Dependabot bumps it.
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: palouse
      MINIO_ROOT_PASSWORD: palouse-dev-secret
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://palouse:palouse@postgres:5432/palouse
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    ports:
      - '127.0.0.1:4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Next rewrite proxy target inside the compose network.
        API_PROXY_TARGET: http://api:4000
    restart: unless-stopped
    env_file: .env
    environment:
      PALOUSE_API_URL: http://api:4000
      API_PROXY_TARGET: http://api:4000
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://palouse:palouse@postgres:5432/palouse
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: apps/mcp/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PALOUSE_API_URL: http://api:4000
    ports:
      - '127.0.0.1:7777:7777'
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
