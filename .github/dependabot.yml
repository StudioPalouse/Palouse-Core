version: 2
updates:
  # JS dependencies across the pnpm workspace.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # One PR for the low-risk bumps; majors still come individually.
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # bullmq and ioredis are held back on purpose via pnpm.overrides in the
      # root package.json (bullmq 5.78.0, ioredis 5.10.1). A lockfile-only
      # Dependabot bump cannot edit the overrides block, so the two disagree and
      # CI fails on `pnpm install --frozen-lockfile` (ERR_PNPM_LOCKFILE_CONFIG_MISMATCH).
      # The unpin is a deliberate, coupled change (bump + queue-typing pass); do it
      # by hand, not via an auto PR. See docs/dependencies.md. Ignore here to stop
      # the recurring failing PRs (e.g. PR #126).
      - dependency-name: bullmq
      - dependency-name: ioredis

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # Base image digests in the app Dockerfiles. Major Node bumps (e.g. 22->26)
  # are a deliberate, tested change, not an automatic one; only take digest and
  # minor/patch updates here.
  - package-ecosystem: docker
    directories:
      - /apps/api
      - /apps/web
      - /apps/worker
      - /apps/mcp
    schedule:
      interval: weekly
    ignore:
      - dependency-name: node
        update-types:
          - version-update:semver-major
