name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never overlap deploys; queue instead of cancel so migrations are not interrupted.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  # E2E is the pre-merge gate in CI (ci.yml), not a deploy-time gate: it runs
  # against its own ephemeral stack, so re-running it here would re-test the
  # already-merged commit in a substrate that isn't the deployed artifact. The
  # meaningful post-deploy signal is the smoke job below (hits the live env).
  deploy-api:
    name: Deploy api (runs migrations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy . --config fly/api.toml --dockerfile apps/api/Dockerfile --remote-only --yes

  deploy-services:
    name: Deploy ${{ matrix.app }}
    needs: deploy-api
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [web, worker, mcp]
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy . --config fly/${{ matrix.app }}.toml --dockerfile apps/${{ matrix.app }}/Dockerfile --remote-only --yes

  smoke:
    name: Staging smoke test
    needs: deploy-services
    runs-on: ubuntu-latest
    steps:
      - name: API liveness
        run: curl -fsS --retry 5 --retry-delay 5 --retry-all-errors https://palouse-staging-api.fly.dev/health
      - name: API readiness (DB reachable)
        run: curl -fsS --retry 5 --retry-delay 5 --retry-all-errors https://palouse-staging-api.fly.dev/health/ready
      - name: Web responds
        run: curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o /dev/null https://palouse-staging-web.fly.dev/
      - name: MCP liveness
        run: curl -fsS --retry 5 --retry-delay 5 --retry-all-errors https://palouse-staging-mcp.fly.dev/healthz
