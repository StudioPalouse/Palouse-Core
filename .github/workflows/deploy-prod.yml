name: Deploy Production

# Prod deploys are gated on version tags (cut a release → tag vX.Y.Z), separate
# from staging's deploy-on-push-to-main. workflow_dispatch allows manual re-runs.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Never overlap deploys; queue instead of cancel so migrations are not interrupted.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}

jobs:
  # No E2E gate here: prod tags are cut from an already-green main (validated by
  # the pre-merge CI E2E in ci.yml), and the E2E suite runs its own ephemeral
  # stack rather than the deployed artifact. The post-deploy smoke job below is
  # the real check against live prod. NOTE: tags do not trigger ci.yml, so this
  # relies on tagging a commit that passed CI on main (enforce via branch
  # protection requiring the E2E check to merge).
  deploy-api:
    name: Deploy api (runs migrations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy . --config fly/api.prod.toml --dockerfile apps/api/Dockerfile --remote-only --yes

  deploy-services:
    name: Deploy ${{ matrix.app }}
    needs: deploy-api
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [web, worker, mcp]
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy . --config fly/${{ matrix.app }}.prod.toml --dockerfile apps/${{ matrix.app }}/Dockerfile --remote-only --yes

  smoke:
    name: Production smoke test
    needs: deploy-services
    runs-on: ubuntu-latest
    steps:
      - name: API liveness
        run: curl -fsS --retry 5 --retry-delay 5 --retry-all-errors https://palouse-prod-api.fly.dev/health
      - name: API readiness (DB reachable)
        run: curl -fsS --retry 5 --retry-delay 5 --retry-all-errors https://palouse-prod-api.fly.dev/health/ready
      - name: Web responds
        run: curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o /dev/null https://palouse-prod-web.fly.dev/
      - name: MCP liveness
        run: curl -fsS --retry 5 --retry-delay 5 --retry-all-errors https://palouse-prod-mcp.fly.dev/healthz
