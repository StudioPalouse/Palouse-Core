name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    # Non-blocking for now: surfaces advisories without gating merges. Tighten
    # to required once the backlog is clean (docs/security-fixes.md).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Report-only for now: prints advisories to the log without failing the
      # job (Dependabot opens the actual bump PRs). Drop the `|| true` to make
      # a vulnerable production dependency gate merges once the backlog is clean.
      - name: pnpm audit (production)
        run: pnpm audit --prod || true

      # Scans dependencies and Dockerfile/compose config for known CVEs and
      # misconfigurations. Runs even if audit reported findings.
      - name: Trivy filesystem scan
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

  e2e:
    name: E2E
    uses: ./.github/workflows/e2e.yml
