  .lead { font-size: 13px; color: #4f6157; margin: 0 0 24px; max-width: 62ch; }
  .themes { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 720px) { .themes { grid-template-columns: 1fr; } }
  .panel { border-radius: 14px; padding: 22px; border: 1px solid; display: flex; align-items: center; gap: 26px; }
  .panel.light { background: oklch(0.985 0.005 165); border-color: oklch(0.9 0.01 165); color: oklch(0.22 0.01 165); }
  .panel.dark { background: oklch(0.155 0.024 165); border-color: oklch(0.62 0.04 165 / 32%); color: oklch(0.97 0.01 165); }
  .sizes { display: flex; align-items: flex-end; gap: 16px; }
  .mark { background: var(--logo) center/contain no-repeat; }
  .s24 { width: 24px; height: 24px; } .s36 { width: 36px; height: 36px; } .s56 { width: 56px; height: 56px; }
  .lockup { display: flex; align-items: center; gap: 10px; }
  .lockup span { font-size: 24px; font-weight: 600; letter-spacing: -0.01em; }
</style>
</head>
<body>
  <h1>Brand mark</h1>
  <p class="lead">The circular rolling-hills mark: a green gradient with white contour lines echoing the Palouse's worked fields. It reads on both the light and green-tinted dark themes with no per-theme swap. Pair it with a foreground-colored wordmark.</p>
  <div class="themes">
    <section class="panel light">
      <div class="sizes">
        <span class="mark s24"></span><span class="mark s36"></span><span class="mark s56"></span>
      </div>
      <div class="lockup"><span class="mark s36"></span><span>Palouse</span></div>
    </section>
    <section class="panel dark">
      <div class="sizes">
        <span class="mark s24"></span><span class="mark s36"></span><span class="mark s56"></span>
      </div>
      <div class="lockup"><span class="mark s36"></span><span>Palouse</span></div>
    </section>
  </div>
</body>
</html>
