# Palouse MCP server — production (public alpha)
# Deploy from repo root: flyctl deploy . --config fly/mcp.prod.toml --dockerfile apps/mcp/Dockerfile --remote-only
#
# Agents authenticate per request (Authorization: Bearer palouse_agk_...), so
# the machine can stop to zero between calls. Needs DATABASE_URL + REDIS_URL
# (and the shared loader's BETTER_AUTH_SECRET / PALOUSE_ENCRYPTION_KEY) set as
# Fly secrets, same as the api app. Deploy only when MCP ships (M5).
app = "palouse-prod-mcp"
primary_region = "iad"

[http_service]
  internal_port = 7777
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  MCP_HTTP_PORT = "7777"
  PALOUSE_API_URL = "https://palouse-prod-api.fly.dev"
  # Required by the shared env loader; public base URLs are the web origin.
  API_BASE_URL = "https://app.palouse.ai"
  BETTER_AUTH_URL = "https://app.palouse.ai"
  WEB_BASE_URL = "https://app.palouse.ai"
  # Audience this server verifies OAuth access tokens against (must match the
  # aud the API mints); also the resource in its protected-resource metadata.
  PUBLIC_MCP_URL = "https://mcp.palouse.ai/mcp"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
