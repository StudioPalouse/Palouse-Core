# Palouse API — production (public alpha)
# Deploy from repo root: flyctl deploy . --config fly/api.prod.toml --dockerfile apps/api/Dockerfile --remote-only
app = "palouse-prod-api"
primary_region = "iad"

[deploy]
  # Runs in a one-off machine with this app's env + secrets before new machines start.
  release_command = "pnpm --filter @palouse/db migrate"

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  API_PORT = "4000"
  # Public traffic (browsers, OAuth callbacks, webhooks) enters through the web
  # origin's rewrite proxy, so the public-facing base URLs are the WEB origin.
  API_BASE_URL = "https://app.palouse.ai"
  BETTER_AUTH_URL = "https://app.palouse.ai"
  WEB_BASE_URL = "https://app.palouse.ai"
  # Hosted cloud: work emails only — public providers (gmail, outlook, …) can't sign up.
  AUTH_BLOCK_PUBLIC_EMAIL_DOMAINS = "true"
  # Verified Resend sending domain (shared with staging for alpha).
  MAIL_FROM = "Palouse <no-reply@mail.palouse.ai>"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine warm: the web proxy targets palouse-prod-api.internal,
  # and .internal DNS only resolves started machines (it cannot wake stopped ones).
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
